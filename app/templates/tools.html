{% extends "blog/base.html" %}
{% block content %}
<style>
    #tools-hero {
        padding: 140px 0 80px;
        min-height: 100vh;
        background: var(--black);
    }
    .converter-container {
        max-width: 850px;
        margin: 0 auto;
        background: var(--black2);
        border: 1px solid var(--black4);
        border-radius: 24px;
        padding: 40px;
    }
    /* Format Selection UI */
    .selection-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 40px;
        flex-wrap: wrap;
    }
    .format-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .arrow-icon {
        font-size: 20px;
        color: var(--green);
    }
    .format-select {
        background: var(--black3);
        color: var(--white);
        border: 1px solid var(--black4);
        padding: 12px 24px;
        border-radius: 12px;
        font-family: var(--font-head);
        font-weight: 600;
        cursor: pointer;
        outline: none;
        transition: var(--transition);
    }
    .format-select:focus {
        border-color: var(--green);
    }

    /* Upload UI */
    .upload-box {
        border: 2px dashed var(--black4);
        padding: 60px 20px;
        border-radius: 16px;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 30px;
        text-align: center;
    }
    .upload-box.active {
        border-color: var(--green);
        background: var(--green4);
    }
    .upload-box i {
        font-size: 50px;
        color: var(--green);
        margin-bottom: 15px;
    }

    #preview-container {
        margin-top: 30px;
        display: none;
        text-align: center;
        animation: fade-up 0.5s forwards;
    }
    .preview-card {
        background: var(--black3);
        border: 1px solid var(--black4);
        padding: 20px;
        border-radius: 16px;
        display: inline-block;
    }
    .preview-img {
        max-width: 300px;
        max-height: 300px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid var(--black4);
    }
    .btn-primary {
        padding: 14px 30px;
        width: 100%;
    }
</style>

<section id="tools-hero">
    <div class="container">
        <div class="reveal" style="text-align: center; margin-bottom: 50px;">
            <span class="section-tag">NEXA Tools</span>
            <h1 class="section-title">Image Converter<span>.</span></h1>
            <p class="section-subtitle" style="margin: 0 auto;">Professional grade asset conversion, right in your browser.</p>
        </div>

        <div class="converter-container reveal reveal-delay-1">
            <div class="selection-header">
                <div class="format-group">
                    <span style="font-size: 14px; color: var(--gray);">Convert from:</span>
                    <select id="source-format" class="format-select">
                        <option value="any">Auto Detect</option>
                        <option value="png">PNG</option>
                        <option value="jpg">JPG / JPEG</option>
                        <option value="webp">WEBP</option>
                        <option value="gif">GIF</option>
                        <option value="bmp">BMP</option>
                    </select>
                </div>
                
                <div class="arrow-icon"><i class="fas fa-long-arrow-alt-right"></i></div>

                <div class="format-group">
                    <span style="font-size: 14px; color: var(--gray);">Convert to:</span>
                    <select id="target-format" class="format-select">
                        <option value="image/webp">WEBP (Optimized)</option>
                        <option value="image/png">PNG (Lossless)</option>
                        <option value="image/jpeg">JPG (Standard)</option>
                        <option value="image/bmp">BMP</option>
                        <option value="image/gif">GIF</option>
                    </select>
                </div>
            </div>

            <div class="upload-box" id="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="upload-text">Drag & drop image or <strong>click to browse</strong></p>
                <span style="font-size: 12px; color: var(--gray2);">Privacy First: Conversion happens locally</span>
            </div>

            <div id="preview-container">
                <div class="preview-card">
                    <img src="" id="image-preview" class="preview-img">
                    <div id="file-info" style="font-size: 12px; margin-bottom: 15px; color: var(--gray);"></div>
                    <button id="convert-btn" class="btn-primary">Download Converted Image →</button>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('image-preview');
    const convertBtn = document.getElementById('convert-btn');
    const uploadText = document.getElementById('upload-text');
    const fileInfo = document.getElementById('file-info');
    
    let sourceImage = null;
    let originalFileName = "nexa-asset";

    // Handle Drag and Drop Visuals
    ['dragenter', 'dragover'].forEach(name => {
        dropZone.addEventListener(name, (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });
    });

    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
        });
    });

    dropZone.onclick = () => fileInput.click();
    dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) {
            alert("Please upload a valid image file.");
            return;
        }

        originalFileName = file.name.split('.')[0];
        const reader = new FileReader();
        
        reader.onload = (event) => {
            previewImg.src = event.target.result;
            previewContainer.style.display = 'block';
            uploadText.innerHTML = `File selected: <strong>${file.name}</strong>`;
            fileInfo.innerText = `Original Size: ${(file.size / 1024).toFixed(2)} KB`;
            
            sourceImage = new Image();
            sourceImage.src = event.target.result;
            
            // Auto-scroll to preview
            previewContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        reader.readAsDataURL(file);
    }

    convertBtn.onclick = () => {
        if (!sourceImage) return;

        const canvas = document.createElement('canvas');
        const targetMime = document.getElementById('target-format').value;
        const extension = targetMime.split('/')[1];

        canvas.width = sourceImage.width;
        canvas.height = sourceImage.height;
        
        const ctx = canvas.getContext('2d');
        
        // Handle transparency for JPEG (fills white background)
        if (targetMime === 'image/jpeg') {
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        ctx.drawImage(sourceImage, 0, 0);
        
        // Trigger Download
        const dataUrl = canvas.toDataURL(targetMime, 0.9); // 0.9 quality for webp/jpeg
        const link = document.createElement('a');
        link.download = `${originalFileName}-nexa.${extension}`;
        link.href = dataUrl;
        link.click();
    };
</script>
{% endblock %}
