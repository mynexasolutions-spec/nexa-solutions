{% extends "blog/base.html" %}
{% block content %}

<style>
    #tts-hero { 
        padding: 140px 0 80px; 
        min-height: 100vh; 
        background: var(--black); 
    }
    
    .tts-container {
        max-width: 700px; 
        margin: 0 auto;
        background: var(--black2); 
        border: 1px solid var(--black4);
        padding: 40px; 
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 20px;
    }

    textarea {
        width: 100%; 
        height: 220px; 
        background: var(--black3);
        border: 1px solid var(--black4); 
        border-radius: 16px;
        padding: 20px; 
        color: var(--white); 
        font-family: inherit;
        font-size: 16px;
        resize: none; 
        outline: none; 
        transition: all 0.3s ease;
    }

    textarea:focus { 
        border-color: var(--green); 
        box-shadow: 0 0 0 4px var(--green4);
    }

    .char-counter {
        position: absolute;
        bottom: 15px;
        right: 20px;
        font-size: 12px;
        color: var(--gray2);
        font-weight: 600;
        pointer-events: none;
    }

    .controls-row {
        display: flex;
        gap: 15px;
        margin-top: 10px;
    }

    .btn-clear {
        background: transparent;
        border: 1px solid var(--black4);
        color: var(--gray2);
        padding: 12px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-clear:hover {
        border-color: #ff4d4d;
        color: #ff4d4d;
        background: rgba(255, 77, 77, 0.05);
    }

    .status-bar { 
        display: none; 
        margin-top: 20px; 
        color: var(--green); 
        font-size: 13px; 
        font-weight: 600;
        text-align: center;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
    }

    .audio-player {
        margin-top: 35px; 
        width: 100%; 
        display: none;
        background: var(--black3); 
        padding: 25px; 
        border-radius: 16px;
        border: 1px solid var(--black4);
        animation: fade-up 0.5s ease forwards;
    }

    audio { 
        width: 100%; 
        margin: 15px 0;
        filter: invert(100%) hue-rotate(180deg) brightness(1.5); 
    }

    .player-header {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Voice Selection Grid */
    .voice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
    }

    .voice-option {
        position: relative;
        background: var(--black3);
        border: 1px solid var(--black4);
        padding: 15px;
        border-radius: 12px;
        cursor: pointer;
        text-align: center;
        transition: 0.3s;
    }

    .voice-option:hover { border-color: var(--green); }

    /* The Hidden Radio Input */
    .voice-option input[type="radio"] {
        position: absolute;
        opacity: 0;
        cursor: pointer;
    }

    /* Selected State */
    .voice-option:has(input:checked) {
        border-color: var(--green);
        background: rgba(0, 255, 136, 0.05);
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
    }

    .voice-option i {
        font-size: 20px;
        margin-bottom: 8px;
        color: var(--gray2);
    }

    .voice-option:has(input:checked) i { color: var(--green); }

    .voice-name {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--white);
    }

    .voice-desc {
        display: block;
        font-size: 11px;
        color: var(--gray2);
    }

    .preview-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        color: var(--green);
        font-size: 18px;
        opacity: 0.6;
        transition: 0.3s;
        z-index: 10;
    }
    .preview-badge:hover {
        opacity: 1;
        transform: scale(1.2);
    }
</style>

<section id="tts-hero">
    <div class="container">
        <div class="reveal" style="text-align: center; margin-bottom: 50px;">
            <span class="section-tag">NEXA Neural Voice</span>
            <h1 class="section-title">Text to Speech<span>.</span></h1>
            <p class="section-subtitle" style="margin: 0 auto;">High-fidelity AI voice synthesis for English and Hindi content.</p>
        </div>

        <div class="tts-container reveal reveal-delay-1">
            <div class="input-wrapper">
                <textarea id="text-input" maxlength="2000" placeholder="Type in English or Hindi (e.g., नमस्ते, NEXA कैसे मदद कर सकता है?)..."></textarea>
                <div class="char-counter" id="char-count">0 / 2000</div>
            </div>
            

            <div class="voice-grid">
                <label class="voice-option">
                    <input type="radio" name="voice_id" value="N2al4jd45e882svx17SU" checked>
                    <div class="preview-badge" onclick="playElevenPreview('N2al4jd45e882svx17SU', event)">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <i class="fas fa-male"></i>
                    <span class="voice-name">Aakash</span>
                    <span class="voice-desc">Warm Male</span>
                </label>

                <label class="voice-option">
                    <input type="radio" name="voice_id" value="5mnzuCX5VBUY3U7RY1pn">
                    <div class="preview-badge" onclick="playElevenPreview('5mnzuCX5VBUY3U7RY1pn', event)">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <i class="fas fa-female"></i>
                    <span class="voice-name">Nikita</span>
                    <span class="voice-desc">Energetic female</span>
                </label>

                <label class="voice-option">
                    <input type="radio" name="voice_id" value="FmBhnvP58BK0vz65OOj7">
                    <div class="preview-badge" onclick="playElevenPreview('FmBhnvP58BK0vz65OOj7', event)">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <i class="fas fa-male"></i>
                    <span class="voice-name">Viraj</span>
                    <span class="voice-desc">Energetic male</span>
                </label>
            </div>

            <audio id="preview-player" style="display:none;"></audio>
            
            <div id="status" class="status-bar">
                <i class="fas fa-microchip"></i> Neural engine is synthesizing natural speech...
            </div>


            

            <div class="controls-row">
                <button id="speak-btn" class="btn-primary" style="flex: 3;">
                    <i class="fas fa-magic" style="margin-right: 8px;"></i> Generate AI Voice
                </button>
                <button id="clear-btn" class="btn-clear" title="Clear Text">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>

            <div class="audio-player" id="player-container">
                <div class="player-header">
                    <i class="fas fa-waveform"></i> AI Voice Output Ready
                </div>
                <audio id="audio-out" controls></audio>
                <a id="download-audio" class="btn-outline" style="margin-top: 10px; display: block; text-align: center; border-color: var(--green); color: var(--green);" download="nexa-ai-speech.mp3">
                    <i class="fas fa-download"></i> Download High-Quality MP3
                </a>
            </div>
        </div>
    </div>
</section>

<script>
    const textInput = document.getElementById('text-input');
    const charCount = document.getElementById('char-count');
    const speakBtn = document.getElementById('speak-btn');
    const clearBtn = document.getElementById('clear-btn');
    const status = document.getElementById('status');
    const playerContainer = document.getElementById('player-container');
    const audioOut = document.getElementById('audio-out');
    const downloadLink = document.getElementById('download-audio');

    // --- Live Character Counter ---
    textInput.addEventListener('input', () => {
        const length = textInput.value.length;
        charCount.innerText = `${length} / 2000`;
        
        if (length >= 1800) {
            charCount.style.color = "#ff4d4d";
        } else {
            charCount.style.color = "var(--gray2)";
        }
    });


    async function playElevenPreview(voiceId, event) {
        event.preventDefault();
        event.stopPropagation();
        
        const icon = event.currentTarget.querySelector('i');
        icon.className = 'fas fa-spinner fa-spin'; 

        try {
            // Adding the leading slash / ensures it looks at the root of your domain
            const response = await fetch(`/get-voice-preview/${voiceId}`);
            
            if (!response.ok) throw new Error("Route not found");

            const data = await response.json();

            if (data.preview_url) {
                const player = document.getElementById('preview-player');
                player.src = data.preview_url;
                player.oncanplaythrough = () => {
                    player.play();
                    icon.className = 'fas fa-play-circle'; 
                };
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not load preview. Check if the route exists in main_routes.py");
            icon.className = 'fas fa-play-circle';
        }
    }

    // --- Clear Button Logic ---
    clearBtn.onclick = () => {
        if (textInput.value.length > 0) {
            textInput.value = '';
            charCount.innerText = "0 / 2000";
            playerContainer.style.display = 'none';
            status.style.display = 'none';
            audioOut.src = '';
            textInput.focus();
        }
    };

    // --- Generation Logic ---
    speakBtn.onclick = async () => {
    const text = textInput.value.trim();
    // Get the ID of the selected voice persona
    const selectedVoice = document.querySelector('input[name="voice_id"]:checked').value;
    
    if (!text) return alert("Please enter text.");

    speakBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Synthesizing...';
    speakBtn.disabled = true;

    const formData = new FormData();
    formData.append('text', text);
    formData.append('voice_id', selectedVoice); // Send this to the backend!

        try {
            const response = await fetch('/generate-audio', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                audioOut.src = audioUrl;
                downloadLink.href = audioUrl;
                
                playerContainer.style.display = 'block';
                speakBtn.innerHTML = '<i class="fas fa-check"></i> Synthesis Complete';
                
                // Auto-play
                audioOut.play();
                
                // Smooth scroll to player
                playerContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                throw new Error("AI Engine busy or returned an error.");
            }
        } catch (error) {
            console.error(error);
            alert("The AI engine is currently processing other requests. Please try again in a moment.");
            speakBtn.innerHTML = '<i class="fas fa-redo"></i> Try Again';
        } finally {
            status.style.display = 'none';
            setTimeout(() => {
                speakBtn.disabled = false;
                if(speakBtn.innerHTML.includes('Complete') || speakBtn.innerHTML.includes('Try Again')) {
                    speakBtn.innerHTML = '<i class="fas fa-magic"></i> Generate AI Voice';
                }
            }, 4000);
        }
    };
</script>

{% endblock %}
